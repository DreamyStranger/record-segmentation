name: CI

# -----------------------------------------------------------------------------
# When this workflow runs
# -----------------------------------------------------------------------------
on:
  push:
    branches:
      - main
      - master
  pull_request:

# -----------------------------------------------------------------------------
# Avoid wasting CI minutes on outdated runs for the same branch/PR
# -----------------------------------------------------------------------------
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Lint + type-check
  # ===========================================================================
  lint-and-typecheck:
    name: Lint and type-check (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # Check out repository code
      # -----------------------------------------------------------------------
      - name: Check out code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Set up Python
      # -----------------------------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # -----------------------------------------------------------------------
      # Install project + development dependencies from pyproject.toml
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      # -----------------------------------------------------------------------
      # Run Ruff linter
      # -----------------------------------------------------------------------
      - name: Run Ruff
        run: ruff check .

      # -----------------------------------------------------------------------
      # Run MyPy type checking
      # -----------------------------------------------------------------------
      - name: Run MyPy
        run: mypy .

  # ===========================================================================
  # Test matrix
  # ===========================================================================
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      # -----------------------------------------------------------------------
      # Check out repository code
      # -----------------------------------------------------------------------
      - name: Check out code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Set up Python for this matrix entry
      # -----------------------------------------------------------------------
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # -----------------------------------------------------------------------
      # Install project + development dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      # -----------------------------------------------------------------------
      # Run tests with coverage
      # -----------------------------------------------------------------------
      - name: Run pytest with coverage
        run: |
          pytest --cov=record_segmentation --cov-report=term-missing --cov-report=xml

      # -----------------------------------------------------------------------
      # Upload coverage XML as an artifact for later inspection
      # -----------------------------------------------------------------------
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-python-${{ matrix.python-version }}
          path: coverage.xml